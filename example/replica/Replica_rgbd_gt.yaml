# Replica RGB-D config for Structure-PLP-SLAM — using Replica GT depth
# Camera: synthetic pinhole, no distortion
# Intrinsics from /mnt/crucial/rueyday/data/Replica/cam_params.json
# depth stored as uint16 PNG, depth_m = pixel_value / 6553.5
# Max usable depth: 10.0 m (covers all Replica scenes, including offices with corridors)

Camera.name: "Replica RGBD GT"
Camera.setup: "RGBD"
Camera.model: "perspective"

Camera.fx: 600.0
Camera.fy: 600.0
Camera.cx: 599.5
Camera.cy: 339.5

Camera.k1: 0.0
Camera.k2: 0.0
Camera.p1: 0.0
Camera.p2: 0.0
Camera.k3: 0.0

Camera.fps: 30.0
Camera.cols: 1200
Camera.rows: 680
Camera.focal_x_baseline: 90.0

Camera.color_order: "RGB"

#================#
# ORB Parameters #
#================#

Feature.max_num_keypoints: 1000
Feature.scale_factor: 1.2
Feature.num_levels: 8
Feature.ini_fast_threshold: 20
Feature.min_fast_threshold: 7

#=====================#
# Tracking Parameters #
#=====================#

depth_threshold: 10.0
depthmap_factor: 6553.5

#===========================#
# PangolinViewer Parameters #
#===========================#

PangolinViewer.keyframe_size: 0.05
PangolinViewer.keyframe_line_width: 1
PangolinViewer.graph_line_width: 1
PangolinViewer.point_size: 2
PangolinViewer.camera_size: 0.08
PangolinViewer.camera_line_width: 3
PangolinViewer.viewpoint_x: 0
PangolinViewer.viewpoint_y: -0.9
PangolinViewer.viewpoint_z: -1.9
PangolinViewer.viewpoint_f: 400
